name: 'Orbe Verix Core - Forja Universal (Build & Release)'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Instalar dependencias Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Instalar dependencias Frontend
        run: npm install

      - name: Forjar Los Binarios (Tauri Action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Orbe Verix Core v__VERSION__'
          releaseBody: 'El Guardián ha sido forjado. Incluye .exe (Windows), .AppImage (Linux) y Mac.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3
      - name: Instalar NDK
        run: sdkmanager "ndk;25.1.8937393"
      - name: Forjar APK
        run: |
          npm install
          npm run tauri android init
          npm run tauri android build
        env:
          NDK_HOME: $ANDROID_HOME/ndk/25.1.8937393
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: OrbeVerixCore-Android-APK
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
