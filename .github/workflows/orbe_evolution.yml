name: Orbe Evolution Ritual (CI/CD)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer
      - name: Forge APK
        run: |
          cd APK__
          # Nota: En un entorno CI real se requiere configurar el buildozer.spec correctamente
          # buildozer android debug
          echo "Simulación de forja de APK completada" > orbe_v1.apk
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: orbe-apk
          path: APK__/orbe_v1.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install PyInstaller
        run: pip install pyinstaller cryptography
      - name: Forge EXE
        run: |
          pyinstaller --onefile --noconsole orbe_verix_soul.py
      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: orbe-exe
          path: dist/orbe_verix_soul.exe

  deploy-portal:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    steps:
      - uses: actions/checkout@v3
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - name: Upload Portal
        uses: actions/upload-pages-artifact@v1
        with:
          path: 'portal/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
