name: Orbe Evolution Ritual (CI/CD)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-portal:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload Portal
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'portal/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
