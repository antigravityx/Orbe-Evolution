<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verix Vision</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>

  <body>
    <div class="glass-container">
      <header data-tauri-drag-region>
        <h1 class="glow-title" data-tauri-drag-region>Verix Vision</h1>
        <div class="window-controls">
          <button id="btn-pin" class="control-btn" title="Fijar Ventana">📌</button>
          <button id="btn-minimize" class="control-btn" title="Minimizar">_</button>
          <button id="btn-close" class="control-btn close-btn" title="Cerrar">X</button>
        </div>
      </header>
      
      <main>
        <!-- Nuevo Panel de Telemetría -->
        <div id="dashboard-panel" class="dashboard-grid">
          <div class="telemetry-card">
            <div class="ring-container">
              <svg viewBox="0 0 100 100">
                <circle class="ring-bg" cx="50" cy="50" r="45"></circle>
                <circle class="ring-fg cpu-ring" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283"></circle>
              </svg>
              <div class="ring-text" id="cpu-text">0%</div>
            </div>
            <div class="telemetry-label">CPU</div>
          </div>
          <div class="telemetry-card">
            <div class="ring-container">
              <svg viewBox="0 0 100 100">
                <circle class="ring-bg" cx="50" cy="50" r="45"></circle>
                <circle class="ring-fg ram-ring" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283"></circle>
              </svg>
              <div class="ring-text" id="ram-text">0 GB</div>
            </div>
            <div class="telemetry-label">RAM</div>
          </div>
          <div class="telemetry-card health-card">
            <div class="ring-container">
              <svg viewBox="0 0 100 100">
                <circle class="ring-bg" cx="50" cy="50" r="45"></circle>
                <circle class="ring-fg health-ring" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283"></circle>
              </svg>
              <div class="ring-text glow-text" id="health-text">0%</div>
            </div>
            <div class="telemetry-label">Salud Orbe</div>
            <div class="telemetry-sub" id="soldiers-text">Activos: 0</div>
          </div>
        </div>

        <div class="section-header">
          <h2 class="section-title">Senado de los Sueños</h2>
          <div class="action-buttons">
            <button id="btn-toggle-form" class="cyber-button">Redactar Sueño</button>
            <button id="btn-refresh" class="cyber-button" style="padding: 6px 12px; font-size: 0.75rem;">↻</button>
          </div>
        </div>

        <div id="dream-form-container" class="dream-form collapsed">
          <input type="text" id="input-asunto" placeholder="Asunto del sueño..." class="cyber-input" />
          <textarea id="input-desc" placeholder="Desarrolla la historia aquí..." class="cyber-textarea"></textarea>
          <button id="btn-submit-dream" class="cyber-button submit-btn">Registrar en el Orbe</button>
        </div>

        <div id="dreams-list" class="dreams-grid">
          <!-- Los sueños se cargarán aquí -->
          <div class="dream-card loading">
            <p>Conectando con el Senado de los Sueños...</p>
          </div>
        </div>
      </main>

      <footer>
        <p class="status-text" id="status">Orbe en estado de vigilia.</p>
      </footer>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
